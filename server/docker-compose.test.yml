version: "3.9"

services:
  postgres_test:
    image: postgres:16
    container_name: backend_test_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_test

    ports:
      - "5433:5432"

    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_test_data: